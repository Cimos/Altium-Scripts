<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Consolas, Menlo, monospace">
  <defs>
    <g id="channel">
      <rect x="-20" y="-35" width="40" height="70" fill="#1a1a1a" stroke="#e91e63" stroke-width="1.5"/>
      <rect x="-15" y="-28" width="30" height="8" fill="#e91e63" opacity="0.7"/>
      <rect x="-15" y="-17" width="30" height="8" fill="#e91e63" opacity="0.7"/>
      <rect x="-14" y="-5" width="28" height="2" fill="#ff80ab"/>
      <rect x="-15" y="5" width="30" height="8" fill="#e91e63" opacity="0.7"/>
      <rect x="-15" y="16" width="30" height="8" fill="#e91e63" opacity="0.7"/>
      <circle cx="-13" cy="-30" r="1.5" fill="#4dd0e1"/>
      <circle cx="13" cy="-30" r="1.5" fill="#4dd0e1"/>
      <circle cx="-13" cy="30" r="1.5" fill="#4dd0e1"/>
      <circle cx="13" cy="30" r="1.5" fill="#4dd0e1"/>
    </g>
  </defs>

  <rect width="900" height="420" fill="#0f0f11"/>

  <!-- LEFT PANEL -->
  <g transform="translate(30, 30)">
    <text x="170" y="0" fill="#808088" font-size="11" letter-spacing="2" text-anchor="middle">BEFORE</text>
    <text x="170" y="20" fill="#e0e0e4" font-size="14" font-weight="bold" text-anchor="middle">Stacked channels</text>

    <g transform="translate(100, 200)">
      <use href="#channel" transform="translate(0, -140)"/>
      <use href="#channel" transform="translate(0, -70)"/>
      <use href="#channel" transform="translate(0, 0)"/>
      <use href="#channel" transform="translate(0, 70)"/>
      <use href="#channel" transform="translate(0, 140)"/>

      <text x="35" y="-137" fill="#808088" font-size="10">U_DUTC</text>
      <text x="35" y="-67" fill="#808088" font-size="10">U_DUTD</text>
      <text x="35" y="3" fill="#808088" font-size="10">U_DUTE</text>
      <text x="35" y="73" fill="#808088" font-size="10">U_DUTF</text>
      <text x="35" y="143" fill="#808088" font-size="10">. . .</text>
    </g>

    <g transform="translate(250, 200)">
      <use href="#channel"/>
      <rect x="-28" y="-43" width="56" height="86" fill="none" stroke="#4dd0e1" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="0" y="60" fill="#4dd0e1" font-size="10" text-anchor="middle">U_DUTB</text>
      <text x="0" y="72" fill="#4dd0e1" font-size="9" text-anchor="middle">(reference)</text>
    </g>
  </g>

  <g transform="translate(370, 220)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#808088" stroke-width="1.5"/>
    <polyline points="70,-6 80,0 70,6" fill="none" stroke="#808088" stroke-width="1.5"/>
    <text x="40" y="-12" text-anchor="middle" fill="#e0e0e4" font-size="11">run script</text>
  </g>

  <!-- RIGHT PANEL -->
  <g transform="translate(500, 30)">
    <text x="190" y="0" fill="#808088" font-size="11" letter-spacing="2" text-anchor="middle">AFTER</text>
    <text x="190" y="20" fill="#e0e0e4" font-size="14" font-weight="bold" text-anchor="middle">Polar array around origin</text>

    <g transform="translate(190, 200)">
      <circle cx="0" cy="0" r="115" fill="none" stroke="#4dd0e1" stroke-width="0.75" stroke-dasharray="2,3" opacity="0.4"/>

      <!-- 8 channels — each sits on the ring facing radially outward
           (rotation around their own centre matches their position angle) -->
      <g transform="rotate(0) translate(0, 115) rotate(0)"><use href="#channel"/></g>
      <g transform="rotate(45) translate(0, 115) rotate(45)"><use href="#channel"/></g>
      <g transform="rotate(90) translate(0, 115) rotate(90)"><use href="#channel"/></g>
      <g transform="rotate(135) translate(0, 115) rotate(135)"><use href="#channel"/></g>
      <g transform="rotate(180) translate(0, 115) rotate(180)"><use href="#channel"/></g>
      <g transform="rotate(225) translate(0, 115) rotate(225)"><use href="#channel"/></g>
      <g transform="rotate(270) translate(0, 115) rotate(270)"><use href="#channel"/></g>
      <g transform="rotate(315) translate(0, 115) rotate(315)"><use href="#channel"/></g>

      <!-- Reference channel highlight -->
      <g transform="rotate(0) translate(0, 115)">
        <rect x="-28" y="-43" width="56" height="86" fill="none" stroke="#4dd0e1" stroke-width="1.5" stroke-dasharray="3,2"/>
      </g>

      <!-- Origin marker -->
      <circle cx="0" cy="0" r="4" fill="none" stroke="#ff80ab" stroke-width="1.5"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#ff80ab" stroke-width="1"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#ff80ab" stroke-width="1"/>
      <text x="16" y="4" fill="#ff80ab" font-size="10">origin</text>
    </g>
  </g>
</svg>
