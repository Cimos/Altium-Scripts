<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Consolas, Menlo, monospace">
  <defs>
    <marker id="flowArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4dd0e1"/>
    </marker>
  </defs>

  <rect width="900" height="260" fill="#0f0f11"/>

  <!-- Title -->
  <text x="450" y="32" fill="#e0e0e4" font-size="14" font-weight="bold" text-anchor="middle">
    Workflow
  </text>

  <!-- 5 boxes in a row, connected by arrows -->
  <!-- Box 1 -->
  <g transform="translate(30, 80)">
    <rect width="140" height="110" rx="3" fill="#15151a" stroke="#e91e63" stroke-width="1.2"/>
    <text x="70" y="24" fill="#e91e63" font-size="10" text-anchor="middle" letter-spacing="1">STEP 1</text>
    <text x="70" y="50" fill="#e0e0e4" font-size="11" text-anchor="middle" font-weight="bold">Inventory</text>
    <text x="70" y="72" fill="#808088" font-size="9" text-anchor="middle">Scan component</text>
    <text x="70" y="84" fill="#808088" font-size="9" text-anchor="middle">classes, show list</text>
    <text x="70" y="96" fill="#808088" font-size="9" text-anchor="middle">with member counts</text>
  </g>
  <line x1="170" y1="135" x2="200" y2="135" stroke="#4dd0e1" stroke-width="1.5" marker-end="url(#flowArr)"/>

  <!-- Box 2 -->
  <g transform="translate(200, 80)">
    <rect width="140" height="110" rx="3" fill="#15151a" stroke="#e91e63" stroke-width="1.2"/>
    <text x="70" y="24" fill="#e91e63" font-size="10" text-anchor="middle" letter-spacing="1">STEP 2</text>
    <text x="70" y="50" fill="#e0e0e4" font-size="11" text-anchor="middle" font-weight="bold">Prefix</text>
    <text x="70" y="72" fill="#808088" font-size="9" text-anchor="middle">User enters</text>
    <text x="70" y="84" fill="#808088" font-size="9" text-anchor="middle">or confirms the</text>
    <text x="70" y="96" fill="#808088" font-size="9" text-anchor="middle">matching prefix</text>
  </g>
  <line x1="340" y1="135" x2="370" y2="135" stroke="#4dd0e1" stroke-width="1.5" marker-end="url(#flowArr)"/>

  <!-- Box 3 -->
  <g transform="translate(370, 80)">
    <rect width="140" height="110" rx="3" fill="#15151a" stroke="#e91e63" stroke-width="1.2"/>
    <text x="70" y="24" fill="#e91e63" font-size="10" text-anchor="middle" letter-spacing="1">STEP 3</text>
    <text x="70" y="50" fill="#e0e0e4" font-size="11" text-anchor="middle" font-weight="bold">Origin</text>
    <text x="70" y="72" fill="#808088" font-size="9" text-anchor="middle">Click polar centre</text>
    <text x="70" y="84" fill="#808088" font-size="9" text-anchor="middle">on PCB (snaps to</text>
    <text x="70" y="96" fill="#808088" font-size="9" text-anchor="middle">polar grid)</text>
  </g>
  <line x1="510" y1="135" x2="540" y2="135" stroke="#4dd0e1" stroke-width="1.5" marker-end="url(#flowArr)"/>

  <!-- Box 4 -->
  <g transform="translate(540, 80)">
    <rect width="140" height="110" rx="3" fill="#15151a" stroke="#e91e63" stroke-width="1.2"/>
    <text x="70" y="24" fill="#e91e63" font-size="10" text-anchor="middle" letter-spacing="1">STEP 4</text>
    <text x="70" y="50" fill="#e0e0e4" font-size="11" text-anchor="middle" font-weight="bold">Confirm</text>
    <text x="70" y="72" fill="#808088" font-size="9" text-anchor="middle">Review summary:</text>
    <text x="70" y="84" fill="#808088" font-size="9" text-anchor="middle">channels, radius,</text>
    <text x="70" y="96" fill="#808088" font-size="9" text-anchor="middle">angular step</text>
  </g>
  <line x1="680" y1="135" x2="710" y2="135" stroke="#4dd0e1" stroke-width="1.5" marker-end="url(#flowArr)"/>

  <!-- Box 5 -->
  <g transform="translate(710, 80)">
    <rect width="160" height="110" rx="3" fill="#15151a" stroke="#4dd0e1" stroke-width="1.2"/>
    <text x="80" y="24" fill="#4dd0e1" font-size="10" text-anchor="middle" letter-spacing="1">STEP 5</text>
    <text x="80" y="50" fill="#e0e0e4" font-size="11" text-anchor="middle" font-weight="bold">Transform</text>
    <text x="80" y="72" fill="#808088" font-size="9" text-anchor="middle">Rotate each channel</text>
    <text x="80" y="84" fill="#808088" font-size="9" text-anchor="middle">around origin.</text>
    <text x="80" y="96" fill="#808088" font-size="9" text-anchor="middle">Reference stays put.</text>
  </g>

  <!-- Post-script notes -->
  <g transform="translate(30, 215)">
    <text x="0" y="0" fill="#808088" font-size="10">After the script runs:</text>
    <text x="160" y="0" fill="#c0c0c4" font-size="10">Tools → Polygon Pours → Repour All</text>
    <text x="420" y="0" fill="#808088" font-size="10">→</text>
    <text x="445" y="0" fill="#c0c0c4" font-size="10">Run DRC</text>
    <text x="545" y="0" fill="#808088" font-size="10">→</text>
    <text x="570" y="0" fill="#c0c0c4" font-size="10">Review placement</text>
  </g>
</svg>
