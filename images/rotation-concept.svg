<svg viewBox="0 0 700 550" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Consolas, Menlo, monospace">
  <defs>
    <g id="chan">
      <rect x="-22" y="-38" width="44" height="76" fill="#1a1a1a" stroke="#e91e63" stroke-width="1.5"/>
      <rect x="-16" y="-30" width="32" height="9" fill="#e91e63" opacity="0.7"/>
      <rect x="-16" y="-18" width="32" height="9" fill="#e91e63" opacity="0.7"/>
      <rect x="-15" y="-5" width="30" height="2.5" fill="#ff80ab"/>
      <rect x="-16" y="4" width="32" height="9" fill="#e91e63" opacity="0.7"/>
      <rect x="-16" y="16" width="32" height="9" fill="#e91e63" opacity="0.7"/>
    </g>

    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4dd0e1"/>
    </marker>
    <marker id="arrPink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff80ab"/>
    </marker>
  </defs>

  <rect width="700" height="550" fill="#0f0f11"/>

  <text x="350" y="32" fill="#e0e0e4" font-size="14" font-weight="bold" text-anchor="middle">
    How each channel is placed
  </text>
  <text x="350" y="50" fill="#808088" font-size="11" text-anchor="middle">
    rotate the reference's position around origin by i × (360/N)
  </text>

  <g transform="translate(350, 280)">
    <!-- Dashed ring -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#4dd0e1" stroke-width="0.75" stroke-dasharray="2,4" opacity="0.5"/>

    <!-- Radius arrow to reference (straight down) -->
    <line x1="0" y1="10" x2="0" y2="108" stroke="#4dd0e1" stroke-width="1" marker-end="url(#arr)" opacity="0.7"/>
    <text x="-8" y="75" fill="#4dd0e1" font-size="10" text-anchor="end">radius</text>

    <!-- Curved rotation arrow: from near reference to rotated position at 60° CW -->
    <!-- Start: around (15, 138), arc to (-118, 80), radius 150 -->
    <path d="M 15 147 A 150 150 0 0 0 -120 84" fill="none" stroke="#ff80ab" stroke-width="1.5" marker-end="url(#arrPink)"/>
    <text x="-75" y="170" fill="#ff80ab" font-size="11">60°</text>

    <!-- Reference channel at bottom (0°) -->
    <g transform="translate(0, 150)">
      <use href="#chan"/>
    </g>

    <!-- Rotated channel at 60° clockwise — at (-130, 75) -->
    <!-- It's rotated by 60° around its own centre as well so it "faces out" -->
    <g transform="rotate(60)">
      <g transform="translate(0, 150)">
        <use href="#chan"/>
      </g>
    </g>

    <!-- Origin marker — drawn LAST so it sits on top -->
    <circle cx="0" cy="0" r="6" fill="#0f0f11" stroke="#ff80ab" stroke-width="1.5"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#ff80ab" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#ff80ab" stroke-width="1"/>
    <text x="15" y="-10" fill="#ff80ab" font-size="11">origin</text>

    <!-- Label: reference -->
    <text x="0" y="205" fill="#4dd0e1" font-size="11" text-anchor="middle">reference</text>
    <text x="0" y="218" fill="#808088" font-size="10" text-anchor="middle">i = 0, never moves</text>

    <!-- Label: rotated instance -->
    <text x="-130" y="130" fill="#e0e0e4" font-size="11" text-anchor="middle">i = 2</text>
    <text x="-130" y="143" fill="#808088" font-size="10" text-anchor="middle">rotated 60°</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 500)">
    <rect x="0" y="0" width="16" height="16" fill="#1a1a1a" stroke="#e91e63" stroke-width="1"/>
    <text x="24" y="12" fill="#c0c0c4" font-size="10">channel</text>

    <g transform="translate(140, 0)">
      <line x1="0" y1="8" x2="16" y2="8" stroke="#4dd0e1" stroke-width="1" stroke-dasharray="2,3"/>
      <text x="24" y="12" fill="#c0c0c4" font-size="10">ring (radius set by reference)</text>
    </g>

    <g transform="translate(400, 0)">
      <circle cx="8" cy="8" r="5" fill="#0f0f11" stroke="#ff80ab" stroke-width="1.5"/>
      <text x="24" y="12" fill="#c0c0c4" font-size="10">polar origin (user click)</text>
    </g>
  </g>
</svg>
